<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a1424">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="雷娜">
<link rel="manifest" href="manifest_leina.json">
<link rel="apple-touch-icon" href="https://ujaogedhwcbyczzpgzpy.supabase.co/storage/v1/object/public/ai-generated-images/leina_bust.jpg">
<title>雷娜 · 隨身軍師</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif}
html,body{height:100%;overflow:hidden}
body{background:radial-gradient(900px 500px at 50% -5%,#16294a,#0a1424 60%),#0a1424;color:#eaf2fc;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;flex-wrap:nowrap;overflow-x:auto}
.top .ttl{font-weight:800;font-size:15px;white-space:nowrap;margin-right:4px}
.off{flex:0 0 auto;padding:6px 11px;border-radius:999px;border:1px solid #24344a;background:#0f1d33;color:#aecbe8;font-size:12.5px;font-weight:700;white-space:nowrap}
.off.on{background:linear-gradient(120deg,#f37021,#ff8a3d);color:#fff;border-color:transparent}
/* 雷娜全身：上半舞台，站在你面前 */
.stage{position:relative;flex:0 0 42%;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.stage img{height:100%;object-fit:contain;object-position:bottom center;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5))}
.stage::after{content:"";position:absolute;left:0;right:0;bottom:0;height:60px;background:linear-gradient(transparent,#0a1424)}
.bubble{position:absolute;left:12px;right:12px;bottom:8px;background:rgba(15,29,51,.9);border:1px solid #ff8a3d55;border-radius:14px;padding:9px 12px;font-size:13px;line-height:1.5;max-height:38%;overflow-y:auto;display:none}
.bubble.show{display:block}
/* 對話區 */
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.m{max-width:86%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.m.u{align-self:flex-end;background:#f37021;color:#fff;border-bottom-right-radius:4px}
.m.a{align-self:flex-start;background:#13243d;border:1px solid #1d3047;border-bottom-left-radius:4px}
.m.tip{align-self:center;color:#7d93ad;font-size:12px;background:none}
.in{display:flex;gap:8px;padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);border-top:1px solid #1d3047}
.in input{flex:1;padding:12px 15px;border-radius:24px;border:1px solid #24344a;background:#0f1d33;color:#eaf2fc;font-size:15px;outline:none}
.in button{padding:0 18px;border:none;border-radius:24px;background:linear-gradient(120deg,#f37021,#ff8a3d);color:#fff;font-weight:800;font-size:15px}
.in button:disabled{opacity:.5}
.in #mic{padding:0 14px;background:#13243d;border:1px solid #24344a;font-size:18px}
.in #mic.rec{background:#ff3b30;border-color:#ff3b30}
.chips{display:flex;gap:6px;overflow-x:auto;padding:6px 12px 4px}
.chip{flex:0 0 auto;padding:7px 12px;border-radius:999px;border:1px solid #24344a;background:#0f1d33;color:#aecbe8;font-size:12.5px;font-weight:700;white-space:nowrap}
.feed-act{display:inline-block;margin-top:6px;font-size:12px;color:#ff8a3d;font-weight:800}
.home{position:absolute;top:calc(env(safe-area-inset-top) + 10px);right:12px;z-index:5;background:rgba(15,29,51,.7);border:1px solid #24344a;color:#aecbe8;border-radius:999px;padding:5px 11px;font-size:12px;text-decoration:none}
</style>
</head>
<body>
<a class="home" href="index.html">OS ▸</a>
<div class="top" id="offs"></div>
<div class="stage">
  <img src="https://ujaogedhwcbyczzpgzpy.supabase.co/storage/v1/object/public/ai-generated-images/leina_full.png" alt="雷娜" onerror="this.style.opacity=0">
  <div class="bubble" id="bubble"></div>
</div>
<div class="msgs" id="msgs"></div>
<div class="chips" id="chips"></div>
<div class="in"><button id="mic" title="按住說話">🎤</button><input id="input" placeholder="跟雷娜說話…" autocomplete="off"><button id="send">送出</button></div>
<script>
var SUPA='https://ujaogedhwcbyczzpgzpy.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqYW9nZWRod2NieWN6enBnenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTk0ODAsImV4cCI6MjA5MjY3NTQ4MH0.8zWp-rDr8RXhSETxW1cGE4G68KqNZ-UfH74lbILBVxg';
var FN=SUPA+'/functions/v1/commander-chat';
var OFFICERS=[{k:'軍師',e:'💎',n:'雷娜'},{k:'財務官',e:'📊',n:'思妤'},{k:'B2B軍師',e:'📈',n:'語彤'},{k:'戰情官',e:'📡',n:'子涵'},{k:'獵客官',e:'🎯',n:'宥潔'}];
var cur='軍師',busy=false;
function off(k){for(var i=0;i<OFFICERS.length;i++)if(OFFICERS[i].k===k)return OFFICERS[i];return OFFICERS[0];}
function hist(o){try{return JSON.parse(localStorage.getItem('leina_hist_'+o)||'[]')}catch(e){return[]}}
function save(o,h){try{localStorage.setItem('leina_hist_'+o,JSON.stringify(h.slice(-30)))}catch(e){}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
var elOffs=document.getElementById('offs'),elMsgs=document.getElementById('msgs'),elIn=document.getElementById('input'),elSend=document.getElementById('send'),elBub=document.getElementById('bubble');
function renderOffs(){
  elOffs.innerHTML='<span class="ttl">'+off(cur).e+' '+off(cur).n+'</span>'+OFFICERS.map(function(o){return '<button class="off'+(o.k===cur?' on':'')+'" data-k="'+o.k+'">'+o.e+' '+o.n+'</button>'}).join('');
  elOffs.querySelectorAll('.off').forEach(function(b){b.onclick=function(){cur=b.getAttribute('data-k');elIn.placeholder='跟'+off(cur).n+'說話…';renderOffs();renderMsgs()}});
}
function renderMsgs(){
  var h=hist(cur);
  if(!h.length){elMsgs.innerHTML='<div class="m tip">'+off(cur).e+' '+off(cur).n+' 在這，少爺有什麼吩咐？</div>';elBub.classList.remove('show');return;}
  elMsgs.innerHTML=h.map(function(m){return '<div class="m '+(m.role==='user'?'u':'a')+'">'+esc(m.content)+'</div>'}).join('');
  elMsgs.scrollTop=elMsgs.scrollHeight;
  var last=h[h.length-1];
  if(last&&last.role==='assistant'){elBub.textContent=last.content;elBub.classList.add('show');}
}
async function send(){
  var t=(elIn.value||'').trim();if(!t||busy)return;
  busy=true;elSend.disabled=true;elIn.value='';
  var h=hist(cur);h.push({role:'user',content:t});save(cur,h);renderMsgs();
  elBub.textContent='…';elBub.classList.add('show');
  try{
    var r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON,Authorization:'Bearer '+ANON},body:JSON.stringify({officer:cur,message:t,history:h.slice(0,-1)})});
    var d=await r.json();var reply=d.reply||('（'+(d.error||'沒回應')+'）');
    h.push({role:'assistant',content:reply});save(cur,h);
  }catch(e){h.push({role:'assistant',content:'（連線出狀況，稍後再試）'});save(cur,h);}
  busy=false;elSend.disabled=false;renderMsgs();
}
elSend.onclick=send;elIn.addEventListener('keydown',function(e){if(e.key==='Enter')send()});

// 一鍵問（快捷鈕 / feed 一鍵跟雷娜談）
function quickAsk(text){elIn.value=text;send();}
window.leinaAsk=quickAsk;

// 快捷問句列（依軍官給常用問句）
var QUICK={'軍師':['今日最重要3件事','有什麼盲點','該打哪幾家B2B'],'財務官':['錢的狀況','待收款多少','這月賺多少'],'B2B軍師':['今天該打哪幾家','給我開場話術','管線卡在哪'],'戰情官':['系統正常嗎','今天有急件嗎','最近註冊狀況'],'獵客官':['雷達抓到誰','怎麼回他','哪個最值得追']};
function renderChips(){
  var box=document.getElementById('chips');var qs=QUICK[cur]||QUICK['軍師'];
  box.innerHTML=qs.map(function(q){return '<button class="chip">'+esc(q)+'</button>'}).join('');
  box.querySelectorAll('.chip').forEach(function(b){b.onclick=function(){quickAsk(b.textContent)}});
}
var _ro=renderOffs;renderOffs=function(){_ro();renderChips();};

// 🎤 語音輸入（Web Speech；按一下開始講，講完自動送）
var mic=document.getElementById('mic');
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  var rec=new SR();rec.lang='zh-TW';rec.interimResults=false;rec.maxAlternatives=1;var listening=false;
  mic.onclick=function(){ if(busy)return; if(listening){try{rec.stop()}catch(e){}return;} try{rec.start();listening=true;mic.classList.add('rec');}catch(e){} };
  rec.onresult=function(e){var t=e.results[0][0].transcript;elIn.value=t;};
  rec.onerror=function(){listening=false;mic.classList.remove('rec');};
  rec.onend=function(){listening=false;mic.classList.remove('rec'); if((elIn.value||'').trim())send();};
}else{ mic.style.display='none'; }

// 雷娜主動提醒 feed：開頁就把桌面各官丟來的情報秀出來（無時無刻在身邊）
async function loadFeed(){
  try{
    var r=await fetch(SUPA+'/rest/v1/leina_feed?select=id,emoji,officer,title,body,created_at&order=id.desc&limit=20',{headers:{apikey:ANON,Authorization:'Bearer '+ANON}});
    var rows=await r.json();if(!Array.isArray(rows)||!rows.length)return;
    var seen=parseInt(localStorage.getItem('leina_feed_seen')||'0',10);
    var fresh=rows.filter(function(x){return x.id>seen;});
    var box=document.getElementById('msgs');
    var items=(fresh.length?fresh:rows.slice(0,3));
    var head=fresh.length?('💎 少爺，我趁你不在時幫你盯著，這些要看一下：'):('💎 最近的提醒：');
    var html='<div class="m a"><b>'+head+'</b></div>'+items.map(function(f){
      var ask=('關於「'+f.title+'」這件，幫我判斷怎麼處理？').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      return '<div class="m a">'+(f.emoji||'💎')+' <b>'+esc(f.title)+'</b>'+(f.body?'\\n'+esc(String(f.body).slice(0,300)):'')
        +'<br><span class="feed-act" data-ask="'+ask+'">▸ 跟雷娜談這件</span></div>';
    }).join('');
    box.insertAdjacentHTML('afterbegin',html);
    box.querySelectorAll('.feed-act').forEach(function(s){s.onclick=function(){quickAsk(s.getAttribute('data-ask'))}});
    // 把最新一則放上站姿氣泡
    if(items[0]){elBub.textContent=(items[0].emoji||'💎')+' '+items[0].title;elBub.classList.add('show');}
    localStorage.setItem('leina_feed_seen',String(rows[0].id));
  }catch(e){}
}

renderOffs();renderMsgs();loadFeed();
</script>
</body>
</html>
