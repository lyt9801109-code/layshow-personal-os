<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A2540">
<title>🎨 副官生圖工坊 - LAYSHOW</title>

<link rel="manifest" href="manifest_studio.json">
<link rel="apple-touch-icon" href="icon-pool-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: linear-gradient(135deg, #0A2540 0%, #1a3a5c 100%);
  color: #fff;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 100px;
}
.container { max-width: 720px; margin: 0 auto; }

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}
.header h1 { font-size: 22px; font-weight: 700; }
.header .back { color: #FF6B35; text-decoration: none; font-size: 14px; }

.form-card {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}
.form-card h2 { font-size: 16px; margin-bottom: 12px; color: #FF6B35; }

textarea, input[type=text] {
  width: 100%;
  padding: 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #fff;
  font-size: 16px;
  font-family: inherit;
  resize: vertical;
}
textarea { min-height: 80px; }
textarea:focus, input:focus { outline: none; border-color: #FF6B35; }

.type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.type-btn {
  padding: 12px 8px;
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  border-radius: 12px;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.type-btn:hover { background: rgba(255,255,255,0.1); }
.type-btn.active {
  background: rgba(255,107,53,0.2);
  border-color: #FF6B35;
}

.count-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 12px;
}
.count-row label { font-size: 14px; opacity: 0.7; }
.count-row select {
  flex: 1;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
}

.submit-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
  box-shadow: 0 4px 16px rgba(255,107,53,0.4);
  transition: all 0.2s;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,53,0.5); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.preset-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 8px;
}
.preset-btn {
  padding: 10px 8px;
  background: rgba(255,107,53,0.1);
  border: 1px dashed rgba(255,107,53,0.3);
  border-radius: 10px;
  color: #FF6B35;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
}
.preset-btn:hover { background: rgba(255,107,53,0.2); }

.history-list { margin-top: 16px; }
.history-item {
  background: rgba(255,255,255,0.04);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  border-left: 3px solid #999;
}
.history-item.done { border-left-color: #4ade80; }
.history-item.failed { border-left-color: #ef4444; }
.history-item.processing { border-left-color: #fbbf24; }
.history-item.pending { border-left-color: #999; }

.history-item .topic { font-weight: 600; }
.history-item .meta { font-size: 12px; opacity: 0.6; margin-top: 4px; }
.history-item .images {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 4px;
  margin-top: 8px;
}
.history-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; }

.status-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.status-banner.show { opacity: 1; }
.status-banner.success { background: #16a34a; }
.status-banner.error { background: #dc2626; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html" class="back">← 副官首頁</a>
    <h1>🎨 副官生圖工坊</h1>
    <div></div>
  </div>

  <div class="form-card">
    <h2>1️⃣ 主題</h2>
    <textarea id="topic" placeholder="例：台中民宿維護、水管漏水搶救、雷修 B2B 套裝..."></textarea>

    <div style="margin-top:12px;">
      <div style="font-size:12px;opacity:0.6;margin-bottom:6px;">快速範本</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="setPreset('民宿/餐廳維護方案 - 7 日保固')">民宿/餐廳</button>
        <button class="preset-btn" onclick="setPreset('診所水電維修專業團隊')">診所水電</button>
        <button class="preset-btn" onclick="setPreset('社區管理員的數位後援')">社區管理</button>
        <button class="preset-btn" onclick="setPreset('LAYSHOW 雷修 7 日保固承諾')">7 日保固</button>
        <button class="preset-btn" onclick="setPreset('師傅在客戶家進行漏水修理現場')">維修現場</button>
        <button class="preset-btn" onclick="setPreset('LAYSHOW B2B 維護整合包行銷')">B2B 包裝</button>
      </div>
    </div>
  </div>

  <div class="form-card">
    <h2>2️⃣ 類型</h2>
    <div class="type-grid">
      <div class="type-btn active" data-type="b2b_ad" onclick="setType(this)">B2B 廣告</div>
      <div class="type-btn" data-type="ig_post" onclick="setType(this)">IG 貼文</div>
      <div class="type-btn" data-type="fb_ad" onclick="setType(this)">FB 廣告</div>
      <div class="type-btn" data-type="seo_blog" onclick="setType(this)">SEO 配圖</div>
      <div class="type-btn" data-type="quote_cover" onclick="setType(this)">報價封面</div>
    </div>

    <div class="count-row">
      <label>張數：</label>
      <select id="count">
        <option value="2">2 張</option>
        <option value="4" selected>4 張</option>
        <option value="6">6 張</option>
      </select>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitRequest()">
    🚀 派副官生圖
  </button>

  <div class="form-card" style="margin-top:24px;">
    <h2>📋 歷史紀錄</h2>
    <div class="history-list" id="historyList">
      <div style="text-align:center;opacity:0.5;padding:20px;">載入中...</div>
    </div>
  </div>
</div>

<div class="status-banner" id="statusBanner"></div>

<script>
const SUPABASE_URL = "https://ujaogedhwcbyczzpgzpy.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqYW9nZWRod2NieWN6enBnenB5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzA5OTQ4MCwiZXhwIjoyMDkyNjc1NDgwfQ.ogfRhGK994IsYnuSCiRHYzvlKCXQp1QOPGTjNzUgb1Y";

let selectedType = "b2b_ad";

function setType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = el.dataset.type;
}

function setPreset(text) {
  document.getElementById('topic').value = text;
}

function showToast(msg, type='') {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function submitRequest() {
  const topic = document.getElementById('topic').value.trim();
  const count = parseInt(document.getElementById('count').value);
  const btn = document.getElementById('submitBtn');

  if (!topic) {
    showToast('請輸入主題', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ 派副官中...';

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/image_requests`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        user_topic: topic,
        image_type: selectedType,
        count: count,
        source: 'pwa'
      })
    });

    if (r.ok) {
      showToast('✅ 副官接到指令，5 分鐘後傳圖到 Telegram', 'success');
      document.getElementById('topic').value = '';
      setTimeout(loadHistory, 2000);
    } else {
      const t = await r.text();
      showToast('❌ ' + t.slice(0,80), 'error');
    }
  } catch (e) {
    showToast('❌ 網路錯誤', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 派副官生圖';
  }
}

async function loadHistory() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/image_requests?order=created_at.desc&limit=10`, {
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
      }
    });
    const data = await r.json();
    const list = document.getElementById('historyList');

    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div style="text-align:center;opacity:0.5;padding:20px;">還沒有生過圖</div>';
      return;
    }

    list.innerHTML = data.map(item => {
      const statusEmoji = {
        pending: '⏳',
        processing: '🔄',
        done: '✅',
        failed: '❌'
      }[item.status] || '❓';

      const time = new Date(item.created_at).toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

      let imgsHtml = '';
      const urls = item.image_urls;
      if (Array.isArray(urls) && urls.length > 0) {
        imgsHtml = '<div class="images">' + urls.slice(0,6).map(u => `<a href="${u}" target="_blank"><img src="${u}" alt="生圖"></a>`).join('') + '</div>';
      }

      return `
        <div class="history-item ${item.status}">
          <div>${statusEmoji} <span class="topic">${item.user_topic}</span></div>
          <div class="meta">${item.image_type} · ${item.count} 張 · ${time}</div>
          ${imgsHtml}
        </div>
      `;
    }).join('');
  } catch (e) {
    document.getElementById('historyList').innerHTML = '<div style="text-align:center;opacity:0.5;padding:20px;">載入失敗</div>';
  }
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw_studio.js').catch(()=>{});
}

// 初始化
loadHistory();
setInterval(loadHistory, 10000);  // 每 10 秒更新
</script>

</body>
</html>
